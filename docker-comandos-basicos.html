<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comandos Básicos de Docker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --neon-blue: #58a6ff;
      --neon-purple: #7c5cfc;
      --neon-green: #3fb950;
      --neon-pink: #f778ba;
      --neon-cyan: #39d2c0;
      --glow-blue: 0 0 20px rgba(88, 166, 255, 0.15);
      --glow-purple: 0 0 20px rgba(124, 92, 252, 0.15);
      --glow-green: 0 0 20px rgba(63, 185, 80, 0.15);
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 2rem 1rem;
      line-height: 1.6;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding: 2.5rem 1.5rem 2rem;
      background: linear-gradient(135deg, #161b22 0%, #1c2128 50%, #161b22 100%);
      border: 1px solid #30363d;
      border-radius: 14px;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #3fb950, #58a6ff, #7c5cfc, #f778ba, #39d2c0, #3fb950);
      background-size: 400% 100%;
      animation: gradientMove 6s ease infinite;
      filter: blur(1px);
      box-shadow: 0 0 15px rgba(88, 166, 255, 0.3), 0 0 30px rgba(124, 92, 252, 0.15);
    }

    @keyframes neonGlow {
      0% { box-shadow: 0 0 10px rgba(88, 166, 255, 0.3); }
      100% { box-shadow: 0 0 25px rgba(124, 92, 252, 0.5); }
    }

    @keyframes gradientMove {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    header::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(88, 166, 255, 0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 0.8rem;
    }

    .header-logo .docker-icon {
      font-size: 2.8rem;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(88, 166, 255, 0.3));
      animation: iconGlow 3s ease-in-out infinite alternate;
    }

    @keyframes iconGlow {
      0% { filter: drop-shadow(0 0 8px rgba(88, 166, 255, 0.3)); }
      100% { filter: drop-shadow(0 0 18px rgba(88, 166, 255, 0.5)) drop-shadow(0 0 30px rgba(124, 92, 252, 0.2)); }
    }

    .header-logo .title-group {
      text-align: left;
    }

    .header-logo .title-group h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #58a6ff 0%, #7c5cfc 50%, #d2a8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .header-logo .title-group .subtitle-line {
      font-size: 0.8rem;
      color: #8b949e;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .header-author {
      margin-top: 0.8rem;
      font-size: 0.82rem;
      color: #8b949e;
    }

    .header-author strong {
      color: #58a6ff;
      font-weight: 600;
    }

    .search-box {
      position: relative;
      max-width: 500px;
      margin: 1.5rem auto 0;
    }

    .search-box input {
      width: 100%;
      padding: 0.85rem 1rem 0.85rem 3rem;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #161b22;
      color: #c9d1d9;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }

    .search-box input:focus {
      border-color: #58a6ff;
      box-shadow: 0 0 15px rgba(88, 166, 255, 0.12), inset 0 0 15px rgba(88, 166, 255, 0.03);
    }

    .search-box .icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #8b949e;
      font-size: 1.2rem;
    }

    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: #161b22;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .filter-btn:hover {
      border-color: #58a6ff;
      color: #58a6ff;
    }

    .filter-btn.active {
      background: #58a6ff;
      color: #0d1117;
      border-color: #58a6ff;
      font-weight: 600;
      box-shadow: 0 0 15px rgba(88, 166, 255, 0.25);
    }

    .filter-btn .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 0.3rem;
    }

    .dot-beginner { background: #3fb950; box-shadow: 0 0 6px rgba(63, 185, 80, 0.5); }
    .dot-intermediate { background: #d29922; box-shadow: 0 0 6px rgba(210, 153, 34, 0.5); }
    .dot-advanced { background: #f85149; box-shadow: 0 0 6px rgba(248, 81, 73, 0.5); }

    .category {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      margin-bottom: 1.8rem;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .category:not(.collapsed) {
      border-color: rgba(88, 166, 255, 0.25);
      box-shadow: 0 0 18px rgba(88, 166, 255, 0.06), inset 0 0 18px rgba(88, 166, 255, 0.02);
    }

    .category-header {
      background: #1c2128;
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid #30363d;
    }

    .category-header:hover {
      background: #21262d;
    }

    .category-header h2 {
      font-size: 1.3rem;
      color: #f0f6fc;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .category-header h2 .icon-glow {
      font-size: 1.5rem;
      transition: transform 0.3s, filter 0.3s;
      display: inline-block;
    }

    .category-header:hover h2 .icon-glow {
      transform: scale(1.15);
      filter: brightness(1.3) drop-shadow(0 0 6px rgba(88, 166, 255, 0.4));
    }

    .category-header .badge {
      background: #58a6ff;
      color: #0d1117;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.15rem 0.6rem;
      border-radius: 999px;
      box-shadow: 0 0 12px rgba(88, 166, 255, 0.3);
    }

    .toggle-icon {
      font-size: 1.1rem;
      color: #8b949e;
      transition: transform 0.25s;
    }

    .category.collapsed .toggle-icon {
      transform: rotate(-90deg);
    }

    .category.collapsed .commands-table {
      display: none;
    }

    .commands-table {
      width: 100%;
      border-collapse: collapse;
    }

    .commands-table th {
      background: #0d1117;
      color: #8b949e;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.75rem 1.5rem;
      text-align: left;
      border-bottom: 1px solid #30363d;
    }

    .commands-table td {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #21262d;
      vertical-align: top;
    }

    .commands-table tr:last-child td {
      border-bottom: none;
    }

    .commands-table tr:hover td {
      background: #1c2128;
    }

    .command-code {
      background: #0d1117;
      color: #7ee787;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      padding: 0.35rem 0.7rem;
      border-radius: 6px;
      white-space: nowrap;
      border: 1px solid #30363d;
      display: inline-block;
      box-shadow: 0 0 8px rgba(126, 231, 135, 0.06);
    }

    .command-cell {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .copy-btn {
      background: none;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 0.3rem 0.5rem;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
      line-height: 1;
    }

    .copy-btn:hover {
      border-color: #58a6ff;
      color: #58a6ff;
      background: #1c2128;
      box-shadow: 0 0 12px rgba(88, 166, 255, 0.15);
    }

    .copy-btn.copied {
      border-color: #3fb950;
      color: #3fb950;
    }

    .command-desc {
      color: #c9d1d9;
      font-size: 0.92rem;
      line-height: 1.7;
      padding: 0.2rem 0 0.2rem 1rem;
      border-left: 2.5px solid #30363d;
      transition: border-color 0.25s, background 0.25s;
      position: relative;
    }

    tr:hover .command-desc {
      border-left-color: #58a6ff;
      border-image: linear-gradient(to bottom, #58a6ff, #7c5cfc) 1;
      border-left-style: solid;
    }

    .command-desc .desc-icon {
      position: absolute;
      left: -0.5rem;
      top: 0.3rem;
      font-size: 0.5rem;
      color: #58a6ff;
      opacity: 0;
      transition: opacity 0.25s;
    }

    tr:hover .command-desc .desc-icon {
      opacity: 1;
    }

    .command-desc .desc-text {
      display: inline;
    }

    .command-desc .highlight {
      color: #58a6ff;
      font-weight: 600;
    }

    .command-desc .desc-head {
      display: block;
      font-weight: 600;
      color: #f0f6fc;
      margin-bottom: 0.25rem;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .level-badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 0.15rem 0.55rem;
      border-radius: 999px;
      margin-left: 0.4rem;
      vertical-align: middle;
    }

    .level-beginner {
      background: #3fb95022;
      color: #3fb950;
      border: 1px solid #3fb95055;
    }

    .level-beginner:hover {
      box-shadow: 0 0 10px rgba(63, 185, 80, 0.2);
    }

    .level-intermediate {
      background: #d2992222;
      color: #d29922;
      border: 1px solid #d2992255;
    }

    .level-intermediate:hover {
      box-shadow: 0 0 10px rgba(210, 153, 34, 0.2);
    }

    .level-advanced {
      background: #f8514922;
      color: #f85149;
      border: 1px solid #f8514955;
    }

    .level-advanced:hover {
      box-shadow: 0 0 10px rgba(248, 81, 73, 0.2);
    }

    .action-btns {
      margin-top: 0.5rem;
    }

    .example-btn {
      background: linear-gradient(135deg, #2d1b69, #1c2128);
      border: 1px solid #7c5cfc;
      color: #b4a0ff;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.25s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-weight: 500;
      animation: pulse-border 2.5s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { box-shadow: 0 0 0 0 rgba(124, 92, 252, 0.2); }
      50% { box-shadow: 0 0 0 4px rgba(124, 92, 252, 0.1); }
    }

    .example-btn:hover {
      border-color: #9b7eff;
      color: #d4c8ff;
      background: linear-gradient(135deg, #3d2589, #2d1b69);
      transform: translateY(-1px);
    }

    .example-btn .hand-icon {
      display: inline-block;
      font-size: 1rem;
      animation: point 1.5s ease-in-out infinite;
    }

    @keyframes point {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }

    .example-btn .btn-arrow {
      font-size: 0.7rem;
      transition: transform 0.2s;
    }

    .example-btn:hover .btn-arrow {
      transform: translateX(3px);
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal-box {
      background: #161b22;
      border: 1px solid rgba(124, 92, 252, 0.25);
      border-radius: 12px;
      max-width: 780px;
      width: 100%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 30px rgba(124, 92, 252, 0.1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }

    .modal-header h3 {
      color: #f0f6fc;
      font-size: 1.1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .modal-header .cmd-label {
      color: #7ee787;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      background: #0d1117;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      border: 1px solid #30363d;
    }

    .modal-close {
      background: none;
      border: none;
      color: #8b949e;
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      transition: all 0.2s;
      line-height: 1;
    }

    .modal-close:hover {
      color: #f0f6fc;
      background: #21262d;
    }

    .modal-body {
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }

    .modal-desc {
      color: #c9d1d9;
      font-size: 0.95rem;
      margin-bottom: 1.2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #21262d;
    }

    .modal-terminal {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(126, 231, 135, 0.04), inset 0 0 20px rgba(126, 231, 135, 0.02);
    }

    .terminal-bar {
      background: #1c2128;
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      border-bottom: 1px solid #30363d;
    }

    .terminal-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .terminal-dot.red { background: #f85149; }
    .terminal-dot.yellow { background: #d29922; }
    .terminal-dot.green { background: #3fb950; }

    .terminal-title {
      color: #8b949e;
      font-size: 0.75rem;
      margin-left: 0.5rem;
    }

    .terminal-body {
      padding: 1rem 1.2rem;
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      color: #7ee787;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
      max-height: 400px;
      overflow-y: auto;
    }

    .terminal-body .prompt {
      color: #58a6ff;
    }

    .terminal-body .comment {
      color: #8b949e;
      font-style: italic;
    }

    .terminal-body .cmd-line {
      color: #f0f6fc;
      font-weight: 500;
    }

    .terminal-body .cmd-line .prompt-sign {
      color: #58a6ff;
    }

    .terminal-body .output-line {
      color: #7ee787;
    }

    .terminal-body .desc-line {
      color: #8b949e;
    }

    .terminal-body .success-line {
      color: #3fb950;
      font-weight: 600;
    }

    .terminal-body .warn-line {
      color: #d29922;
    }

    .no-results {
      text-align: center;
      padding: 3rem 1rem;
      color: #8b949e;
      font-size: 1.1rem;
      display: none;
    }

    .no-results.visible {
      display: block;
    }

    footer {
      text-align: center;
      color: #484f58;
      font-size: 0.85rem;
      margin-top: 2.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #21262d;
    }

    footer a:hover {
      color: #58a6ff !important;
      text-shadow: 0 0 10px rgba(88, 166, 255, 0.3);
    }

    @media (max-width: 768px) {
      body { padding: 1rem 0.5rem; }
      header h1 { font-size: 1.8rem; }
      .commands-table th, .commands-table td { padding: 0.75rem 1rem; }
      .commands-table th:nth-child(2), .commands-table td:nth-child(2) { display: none; }
      .modal-box { max-width: 100%; max-height: 90vh; }
      .modal-body { padding: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-logo">
        <span class="docker-icon">&#x1F40B;</span>
        <div class="title-group">
          <h1>Docker</h1>
          <div class="subtitle-line">Comandos básicos explicados para principiantes</div>
        </div>
      </div>
      <div class="header-author">Creado por <strong>Ronald Serrano</strong></div>
      <div class="search-box">
        <span class="icon">&#128269;</span>
        <input type="text" id="searchInput" placeholder="Buscar comando... ej: docker run, pull, logs" autofocus>
      </div>
      <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-level="all"><span class="dot" style="background:#8b949e"></span>Todos</button>
        <button class="filter-btn" data-level="beginner"><span class="dot dot-beginner"></span>Principiante</button>
        <button class="filter-btn" data-level="intermediate"><span class="dot dot-intermediate"></span>Intermedio</button>
        <button class="filter-btn" data-level="advanced"><span class="dot dot-advanced"></span>Avanzado</button>
      </div>
    </header>

    <div id="categoriesContainer"></div>

    <div class="no-results" id="noResults">
      No se encontraron comandos con esos filtros.
    </div>

    <footer>
      <a href="https://pe.linkedin.com/in/ronaldmiguelsh" target="_blank" style="color:#8b949e;text-decoration:none;">Contáctanos por LinkedIn: Ronald Serrano &#8599;</a> &mdash; Aprende Docker paso a paso
    </footer>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-header">
        <h3><span>&#128265;</span> Ejemplo: <span class="cmd-label" id="modalCmd"></span></h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="modal-desc" id="modalDesc"></div>
        <div class="modal-terminal">
          <div class="terminal-bar">
            <span class="terminal-dot red"></span>
            <span class="terminal-dot yellow"></span>
            <span class="terminal-dot green"></span>
            <span class="terminal-title">Terminal - Docker</span>
          </div>
          <div class="terminal-body" id="modalOutput"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const data = [
      {
        name: "Información",
        icon: "\uD83D\uDCBB",
        commands: [
          { cmd: "docker version", level: "beginner", desc: "Muestra la <span class='highlight'>versi\u00f3n</span> de Docker instalada en tu equipo. \u00datil para verificar que Docker est\u00e1 correctamente instalado.", example: "Cliente Docker instalado correctamente.\n\n$ docker version\nClient: Docker Engine - Community\n Version:           24.0.7\n API version:       1.43\n Go version:        go1.20.10\n OS/Arch:           windows/amd64\n\nServer: Docker Desktop\n Engine:\n  Version:          24.0.7\n  API version:      1.43\n  Go version:       go1.20.10\n  OS/Arch:          linux/amd64\n\n\u2713 Docker funciona correctamente." },
          { cmd: "docker info", level: "beginner", desc: "Muestra informaci\u00f3n <span class='highlight'>detallada</span> del sistema Docker: cantidad de contenedores, im\u00e1genes, versi\u00f3n del kernel, etc.", example: "Resumen completo del estado de Docker.\n\n$ docker info\nClient:\n Context:    default\n\nServer:\n Containers: 3\n  Running:   1\n  Paused:    0\n  Stopped:   2\n Images:     8\n Server Version: 24.0.7\n Storage Driver: overlay2\n Logging Driver: json-file\n Operating System: Docker Desktop\n OSType: linux\n Architecture: x86_64\n CPUs: 4\n Total Memory: 7.78GiB\n\n\u2713 Puedes ver cu\u00e1ntos recursos tiene Docker." }
        ]
      },
      {
        name: "Im\u00e1genes",
        icon: "\uD83D\uDCE6",
        commands: [

    let currentLevel = 'all';
    let activeCategory = null;

    function collapseAllCategories() {
      document.querySelectorAll('.category').forEach(cat => {
        cat.classList.add('collapsed');
      });
    }

    function formatExample(text) {
      return text.split('\n').map(line => {
        const trimmed = line.trim();
        if (trimmed.startsWith('$ ')) {
          const rest = line.replace('$ ', '');
          return `<span class="cmd-line"><span class="prompt-sign">$</span> ${rest}</span>`;
        }
        if (trimmed.startsWith('\u2713')) {
          return `<span class="success-line">${line}</span>`;
        }
        if (trimmed.startsWith('\u2715')) {
          return `<span class="warn-line">${line}</span>`;
        }
        if (trimmed.startsWith('WARNING!') || trimmed.startsWith('Are you sure')) {
          return `<span class="warn-line">${line}</span>`;
        }
        if (trimmed === '' || trimmed.startsWith('#')) {
          return line;
        }
        return `<span class="output-line">${line}</span>`;
      }).join('\n');
    }

    function openModal(cmd, desc, example, catEl) {
      document.getElementById('modalCmd').textContent = cmd;
      document.getElementById('modalDesc').innerHTML = desc;
      document.getElementById('modalOutput').innerHTML = formatExample(example);
      document.getElementById('modalOverlay').classList.add('visible');
      document.body.style.overflow = 'hidden';
      activeCategory = catEl;
      collapseAllCategories();
    }

    function closeModal() {
      document.getElementById('modalOverlay').classList.remove('visible');
      document.body.style.overflow = '';
      if (activeCategory) {
        collapseAllCategories();
        activeCategory.classList.remove('collapsed');
        activeCategory = null;
      }
    }

    function render() {
      const container = document.getElementById('categoriesContainer');
      container.innerHTML = '';
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      let anyVisible = false;

      data.forEach((cat) => {
        const filtered = cat.commands.filter(c => {
          if (currentLevel !== 'all' && c.level !== currentLevel) return false;
          const fullText = c.cmd.toLowerCase() + ' ' + c.desc.toLowerCase();
          return fullText.includes(query);
        });

        if (query && filtered.length === 0) return;
        anyVisible = true;

        const catDiv = document.createElement('div');
        catDiv.className = 'category';

                    </div>
                    <div class="action-btns">
                      <button class="example-btn" data-cmd="${c.cmd.replace(/</g, '&lt;').replace(/>/g, '&gt;')}" data-desc='${c.desc.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/'/g, "\\'").replace(/"/g, '&quot;')}'><span class="hand-icon">&#128070;</span> Ver resultados del comando <span class="btn-arrow">&#10140;</span></button>
                    </div>
                  </td>
                  <td class="command-desc"><span class="desc-icon">&#9654;</span><span class="desc-head">&#9679; Explicaci&oacute;n</span><span class="desc-text">${c.desc}</span><br><span style="display:inline-block;margin-top:0.4rem;font-size:0.78rem;color:#8b949e;background:#0d1117;padding:0.25rem 0.6rem;border-radius:4px;border:1px solid #21262d;">&#128161; ${getPracticalTip(c.cmd)}</span></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;

        container.appendChild(catDiv);
      });

      document.getElementById('noResults').classList.toggle('visible', !anyVisible);
    }

    // Toggle collapse on header click (accordion: solo una sección abierta)
    document.addEventListener('click', e => {
      const header = e.target.closest('.category-header');
      if (header) {
        const cat = header.closest('.category');
        const wasCollapsed = cat.classList.contains('collapsed');
        document.querySelectorAll('.category').forEach(c => c.classList.add('collapsed'));
        if (wasCollapsed) cat.classList.remove('collapsed');
        return;
      }

      // Copy button
      const copyBtn = e.target.closest('.copy-btn');
      if (copyBtn) {
        const text = copyBtn.getAttribute('data-cmd');
        navigator.clipboard.writeText(text).then(() => {
          copyBtn.classList.add('copied');
          copyBtn.textContent = '\u2713';
          setTimeout(() => {
            copyBtn.classList.remove('copied');
            copyBtn.innerHTML = '&#128203;';
          }, 2000);
        }).catch(() => {
          const ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          copyBtn.classList.add('copied');
          copyBtn.textContent = '\u2713';
          setTimeout(() => {
            copyBtn.classList.remove('copied');
            copyBtn.innerHTML = '&#128203;';
          }, 2000);
        });
        return;
      }

      // Example button - open modal
      const exampleBtn = e.target.closest('.example-btn');
      if (exampleBtn) {
        const cmd = exampleBtn.getAttribute('data-cmd');
        const desc = exampleBtn.getAttribute('data-desc');
        const catEl = exampleBtn.closest('.category');
        // Find the actual example from data
        let example = '';
        for (const cat of data) {
          for (const c of cat.commands) {
            if (c.cmd === cmd) {
              example = c.example || 'Ejemplo no disponible.';
              break;
            }
          }
          if (example) break;
        }
        openModal(cmd, desc, example, catEl);
        return;
      }
    });

    // Modal close
    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    // Search with debounce
    let debounceTimer;
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(render, 200);
    });

    // Difficulty filter
    document.getElementById('filterBar').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentLevel = btn.getAttribute('data-level');
      render();
    });

    render();
  </script>
</body>
</html>
